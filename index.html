<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f0f0f0">
    <meta name="description" content="提供B2停車場車格號碼、柱號的檢索與路線導引">
    <title>B2停車場導航</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body { margin: 0; padding: 0; background: #eee; overflow: hidden; }
        
        #map { 
            height: 100vh; width: 100vw; 
            background-color: #f0f0f0;
            transition: transform 0.25s ease-out, scale 0.3s ease-in-out; 
            transform-origin: center center;
        }

        #map.compass-mode { scale: 2.2; }
        
        .search-container {
            position: absolute; top: 12px; left: 12px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 260px;
            font-family: sans-serif;
        }
        #routeStatus {
            font-size: 15px; margin-bottom: 8px; text-align: center; display: none;
            background: #fff5f5; padding: 6px; border-radius: 8px;
            border: 1px solid #fab1a0; font-weight: bold; color: #d63031;
        }
        #combinedInput {
            width: 100%; height: 42px; font-size: 18px; text-align: center;
            border: 2px solid #ccc; border-radius: 8px;
            background: #fff; box-sizing: border-box; cursor: pointer; margin-bottom: 8px;
        }
        .keypad { display: none; flex-direction: row; gap: 8px; }
        .keypad.active { display: flex; }
        .keypad-letters { display: flex; flex-direction: column; gap: 5px; flex: 0.8; }
        .keypad-main { display: flex; flex-direction: column; gap: 5px; flex: 3.5; }
        .key-row { display: flex; justify-content: space-between; gap: 5px; }
        
        .key-btn {
            flex: 1; height: 44px; font-size: 16px; font-weight: bold;
            cursor: pointer; border: 1px solid #bbb; border-radius: 6px;
            background: #ffffff; color: #333; display: flex; align-items: center; justify-content: center;
        }
        .key-btn:active { background: #ddd; transform: scale(0.95); }

        .btn-a { background-color: #DABE00 !important; color: white; border: none; }
        .btn-b { background-color: #E98B19 !important; color: white; border: none; }
        .btn-c { background-color: #E50012 !important; color: white; border: none; }
        .btn-d { background-color: #0072BE !important; color: white; border: none; }
        .btn-e { background-color: #2B8D56 !important; color: white; border: none; }

        .key-btn.func-clear { background: #fff5f5; color: #e03131; border-color: #ffa8a8; }
        .key-btn.func-search { background: #f4fce3; color: #2f9e44; border-color: #c0eb75; }
        
        .key-btn.nav-point { 
            background-color: #f1f2f6; 
            font-size: 13px; 
            border: 2px solid #ddd;
        }

        /* 按鈕群組 */
        .floating-btns {
            position: absolute; top: 12px; right: 12px; z-index: 1000;
            display: flex; flex-direction: column; gap: 12px;
        }

        .side-btn {
            width: 48px; height: 48px; background: white;
            border: 2px solid #ccc; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            text-decoration: none; color: black;
        }
        #compassBtn.active { background: #ff4757; color: white; border-color: #d63031; }
        #occupancyBtn.active { background: #2f3542; border-color: #000; color: white; }
        
        .popup-nav-container { text-align: center; padding: 5px; }
        .popup-btn {
            display: block; width: 100%; margin-top: 8px; padding: 10px;
            border-radius: 5px; border: 1px solid #ccc; font-weight: bold;
            cursor: pointer; font-size: 14px; box-sizing: border-box;
        }
        .popup-btn.from { background: #0984e3; color: white; border: none; }
        .popup-btn.to { background: #d63031; color: white; border: none; }
    </style>
</head>
<body>

<div class="floating-btns">
    <div id="compassBtn" class="side-btn" onclick="toggleCompass()">🧭</div>
    <a href="https://lmc10520.github.io/plate/" target="_blank" class="side-btn" title="停車場現況">🔗</a>
    <div id="occupancyBtn" class="side-btn" onclick="toggleOccupancy()" title="顯示即時車位">🚥</div>
</div>

<div class="search-container">
    <div id="routeStatus"></div>
    <input type="text" id="combinedInput" placeholder="點擊搜尋/導航" readonly onclick="toggleKeypad()">
    
    <div id="keypadSection" class="keypad">
        <div class="keypad-letters">
            <button class="key-btn btn-a" onclick="appendKey('A')">A</button>
            <button class="key-btn btn-b" onclick="appendKey('B')">B</button>
            <button class="key-btn btn-c" onclick="appendKey('C')">C</button>
            <button class="key-btn btn-d" onclick="appendKey('D')">D</button>
            <button class="key-btn btn-e" onclick="appendKey('E')">E</button>
        </div>
        
        <div class="keypad-main">
            <div class="key-row"><button class="key-btn" onclick="appendKey('1')">1</button><button class="key-btn" onclick="appendKey('2')">2</button><button class="key-btn" onclick="appendKey('3')">3</button></div>
            <div class="key-row"><button class="key-btn" onclick="appendKey('4')">4</button><button class="key-btn" onclick="appendKey('5')">5</button><button class="key-btn" onclick="appendKey('6')">6</button></div>
            <div class="key-row"><button class="key-btn" onclick="appendKey('7')">7</button><button class="key-btn" onclick="appendKey('8')">8</button><button class="key-btn" onclick="appendKey('9')">9</button></div>
            <div class="key-row">
                <button class="key-btn func-clear" onclick="clearInput()">清除</button>
                <button class="key-btn" onclick="appendKey('0')">0</button>
                <button class="key-btn func-search" onclick="executeSearch()">搜尋</button>
            </div>
            <div class="key-row">
                <button class="key-btn nav-point" style="color:#0984e3" onclick="setPoint('from')">設為起點</button>
                <button class="key-btn nav-point" style="color:#d63031" onclick="setPoint('to')">設為終點</button>
            </div>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }

    const imageBounds = [[22.62193, 120.34105], [22.62406, 120.34360]];
    const API_URL = "https://analytics.sto-tek.com/_nodered/api/callExternalAPI?apiKey=495370807e744c8685b05ed5aabc3712&EAPI=API_Building_02&buildingID=kaohsiung_weiwuying&s=&m=lpr&p=0";
    
    const roadNetwork = {
        "nodes": {
            "A1": [120.34124, 22.62270], "A3": [120.34137, 22.62307], "A4": [120.34149, 22.62344], "A5": [120.34164, 22.62391],
            "B1": [120.34175, 22.62254], "B3": [120.34188, 22.62290], "B4": [120.34200, 22.62327], "B5": [120.34216, 22.62374],
            "C1": [120.34250, 22.62227], "C2": [120.34256, 22.62244], "C3": [120.34263, 22.62265], "C4": [120.34275, 22.62301], "C5": [120.34291, 22.62348],
            "D1": [120.34308, 22.62208], "D2": [120.34313, 22.62225], "D4": [120.34332, 22.62282], "D5": [120.34347, 22.62329]
        },
        "edges": [
            ["A1","A3"], ["A3","A4"], ["A4","A5"], ["B1","B3"], ["B3","B4"], ["B4","B5"],
            ["C1","C2"], ["C2","C3"], ["C3","C4"], ["C4","C5"], ["D1","D2"], ["D2","D4"], ["D4","D5"],
            ["A1","B1"], ["B1","C1"], ["C1","D1"], ["C2","D2"], ["A3","B3"], ["B3","C3"],
            ["A4","B4"], ["C4","D4"], ["A5","B5"], ["B5","C5"], ["C5","D5"]
        ]
    };

    const redFlagIcon = L.divIcon({
        html: '<div style="font-size: 38px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));">🚩</div>',
        className: '', iconSize: [40, 40], iconAnchor: [10, 38]
    });

    let geojsonLayer, currentInput = "", activeSpot = null;
    let startData = null, endData = null, routeLine = null, startMarker = null, endMarker = null;
    let isOccupancyMode = false;
    let occupiedSet = new Set();

    const map = L.map('map', { center: [22.6231, 120.3425], zoom: 18, maxZoom: 24, minZoom: 15, zoomControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { opacity: 0.4, maxZoom: 24, maxNativeZoom: 19 }).addTo(map);
    L.imageOverlay('B2-20260218.svg', imageBounds, { opacity: 0.8, interactive: false }).addTo(map);

    // --- 載入數據 ---
    fetch('parking.geojson').then(res => res.json()).then(data => {
        geojsonLayer = L.geoJSON(data, {
            pointToLayer: (f, l) => L.circleMarker(l, { radius: 3, fillColor: "#ff9800", color: "#000", weight: 1, opacity: 0.3, fillOpacity: 0.5 }),
            style: (feature) => ({
                color: "#3388ff", opacity: 0.1, weight: 1, fillColor: "#333", fillOpacity: 0 
            }),
            onEachFeature: function(feature, layer) {
                const name = feature.properties.name;
                const roadId = feature.properties.road_id;
                
                if (roadId) {
                    const popupContent = `
                        <div class="popup-nav-container">
                            <b>${name}</b>
                            <button class="popup-btn from" onclick="setPointViaMap('${name}', 'from')">設為起點</button>
                            <button class="popup-btn to" onclick="setPointViaMap('${name}', 'to')">設為終點</button>
                        </div>
                    `;
                    layer.bindPopup(popupContent);
                } else {
                    layer.bindPopup(`<b>${name}</b>`);
                }
            }
        }).addTo(map);
    });

    // --- 即時車位顯示邏輯 ---
    async function toggleOccupancy() {
        const btn = document.getElementById('occupancyBtn');
        isOccupancyMode = !isOccupancyMode;
        
        if (isOccupancyMode) {
            btn.classList.add('active');
            btn.innerHTML = "⌛"; // 讀取中
            await fetchOccupancyData();
            applyOccupancyStyle();
            btn.innerHTML = "🚗";
        } else {
            btn.classList.remove('active');
            resetOccupancyStyle();
        }
    }

    let occupancyTimer = null; // 新增計時器變數

    // 修改後的切換函式
    async function toggleOccupancy() {
        const btn = document.getElementById('occupancyBtn');
        isOccupancyMode = !isOccupancyMode;
        
        if (isOccupancyMode) {
            btn.classList.add('active');
            
            // 1. 立即進行第一次抓取
            await refreshOccupancy();
            
            // 2. 設定每 60 秒自動執行一次更新 (60000 毫秒)
            occupancyTimer = setInterval(async () => {
                console.log("正在自動更新車位狀態...");
                await refreshOccupancy();
            }, 60000);
            
        } else {
            // 停止模式
            btn.classList.remove('active');
            if (occupancyTimer) {
                clearInterval(occupancyTimer); // 停止計時器
                occupancyTimer = null;
            }
            resetOccupancyStyle();
        }
    }

    // 將抓取與套用樣式封裝成一個函式，方便重複呼叫
    async function refreshOccupancy() {
        const btn = document.getElementById('occupancyBtn');
        const originalIcon = "🚗";
        
        try {
            // 抓取資料時讓按鈕閃爍一下或顯示讀取中，讓使用者知道在更新
            btn.innerHTML = "⌛"; 
            
            await fetchOccupancyData();
            applyOccupancyStyle();
            
            btn.innerHTML = originalIcon;
        } catch (e) {
            btn.innerHTML = "❌"; // 失敗時顯示錯誤
            setTimeout(() => { btn.innerHTML = originalIcon; }, 2000);
        }
    }

    // 這是您剛才修改過、具備「去零」邏輯的資料抓取函式
    async function fetchOccupancyData() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            occupiedSet.clear();
            
            const carData = result.data || result;
            if (Array.isArray(carData)) {
                carData.forEach(item => {
                    // 同時相容 B2F_ 或 B2F-，並處理三位數補零問題
                    if (item.ParkingNumber && (item.ParkingNumber.startsWith("B2F_") || item.ParkingNumber.startsWith("B2F-"))) {
                        const rawNumPart = item.ParkingNumber.substring(4); 
                        const spotNum = parseInt(rawNumPart, 10).toString(); // 去除前導零
                        
                        // 判斷是否有車
                        if (item.LicensePlate && item.LicensePlate !== "" && item.LicensePlate !== "Empty") {
                            occupiedSet.add(spotNum);
                        }
                    }
                });
            }
        } catch (e) {
            console.error("API 抓取失敗", e);
            throw e; // 丟出錯誤讓 refreshOccupancy 處理 UI
        }
    }

    function applyOccupancyStyle() {
        if (!geojsonLayer) return;
        geojsonLayer.eachLayer(layer => {
            const spotName = layer.feature.properties.name.toString();
            if (occupiedSet.has(spotName)) {
                layer.setStyle({ fillOpacity: 0.7, fillColor: "#2d3436", color: "#000", opacity: 0.5 });
            } else {
                // 未占用的保持透明，但要確保原本的樣式不被洗掉
                layer.setStyle({ fillOpacity: 0 });
            }
        });
    }

    function resetOccupancyStyle() {
        if (!geojsonLayer) return;
        geojsonLayer.eachLayer(layer => {
            // 如果這格不是當前搜尋選中的格子，就重置
            if (activeSpot !== layer) {
                geojsonLayer.resetStyle(layer);
            }
        });
    }

    // --- 輔助功能 ---
    function formatInput(val) {
        val = val.toUpperCase();
        if (val.length === 2 && /[A-E]/.test(val[0]) && /\d/.test(val[1])) return val[0] + '0' + val[1];
        return val;
    }

    // --- 羅盤邏輯 ---
    let isCompassActive = false;
    function toggleCompass() {
        if (!isCompassActive) {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') startCompass();
                });
            } else { startCompass(); }
        } else { stopCompass(); }
    }
    function startCompass() {
        isCompassActive = true;
        document.getElementById('compassBtn').classList.add('active');
        document.getElementById('map').classList.add('compass-mode');
        map.dragging.disable();
        if (startData) map.panTo(startData.pos);
        window.addEventListener('deviceorientation', handleOrientation);
    }
    function stopCompass() {
        isCompassActive = false;
        document.getElementById('compassBtn').classList.remove('active');
        document.getElementById('map').classList.remove('compass-mode');
        map.dragging.enable();
        window.removeEventListener('deviceorientation', handleOrientation);
        document.getElementById('map').style.transform = `rotate(0deg)`;
    }
    function handleOrientation(event) {
        let heading = event.webkitCompassHeading || (360 - event.alpha);
        if (heading) {
            document.getElementById('map').style.transform = `rotate(${-heading}deg)`;
            if (startData) map.panTo(startData.pos, {animate: false});
        }
    }

    // --- 導航核心邏輯 ---
    function calcDist(p1, p2) { return Math.sqrt(Math.pow(p1[0]-p2[0],2) + Math.pow(p1[1]-p2[1],2)) * 100000; }
    function dijkstra(start, end) {
        const graph = {};
        for (let id in roadNetwork.nodes) graph[id] = {};
        roadNetwork.edges.forEach(([u, v]) => {
            const d = calcDist(roadNetwork.nodes[u], roadNetwork.nodes[v]);
            graph[u][v] = d; graph[v][u] = d;
        });
        const dists = {}, prevs = {}, pq = new Set(Object.keys(graph));
        Object.keys(graph).forEach(n => dists[n] = Infinity);
        dists[start] = 0;
        while(pq.size) {
            let u = Array.from(pq).reduce((a, b) => dists[a] < dists[b] ? a : b);
            if (u === end || dists[u] === Infinity) break;
            pq.delete(u);
            for (let v in graph[u]) {
                let alt = dists[u] + graph[u][v];
                if (alt < dists[v]) { dists[v] = alt; prevs[v] = u; }
            }
        }
        const path = []; let curr = end;
        while(curr) { path.unshift(curr); curr = prevs[curr]; }
        return path;
    }

    function getProjectionPoint(P, A, B) {
        const x1 = A[0], y1 = A[1], x2 = B[0], y2 = B[1], px = P.lng, py = P.lat;
        const dx = x2-x1, dy = y2-y1;
        let t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / (dx*dx + dy*dy)));
        return [x1 + t*dx, y1 + t*dy];
    }

    function getNearestPathInfo(latlng) {
        let minD = Infinity, best = null;
        roadNetwork.edges.forEach(([u, v]) => {
            const proj = getProjectionPoint(latlng, roadNetwork.nodes[u], roadNetwork.nodes[v]);
            const d = calcDist([latlng.lng, latlng.lat], proj);
            if (d < minD) { minD = d; best = { proj, nodes: [u, v] }; }
        });
        return best;
    }

    function drawRoute() {
        if (routeLine) map.removeLayer(routeLine);
        const sInfo = getNearestPathInfo(startData.pos), eInfo = getNearestPathInfo(endData.pos);
        if (!sInfo || !eInfo) return;
        let bestPath = null, minTotalDist = Infinity;
        sInfo.nodes.forEach(sNode => eInfo.nodes.forEach(eNode => {
            const path = dijkstra(sNode, eNode);
            let total = calcDist([startData.pos.lng, startData.pos.lat], sInfo.proj) + calcDist(sInfo.proj, roadNetwork.nodes[sNode]);
            for(let i=0; i<path.length-1; i++) total += calcDist(roadNetwork.nodes[path[i]], roadNetwork.nodes[path[i+1]]);
            total += calcDist(roadNetwork.nodes[eNode], eInfo.proj) + calcDist(eInfo.proj, [endData.pos.lng, endData.pos.lat]);
            if (total < minTotalDist) { minTotalDist = total; bestPath = path; }
        }));
        let final = [[startData.pos.lat, startData.pos.lng], [sInfo.proj[1], sInfo.proj[0]]];
        bestPath.forEach(id => final.push([roadNetwork.nodes[id][1], roadNetwork.nodes[id][0]]));
        final.push([eInfo.proj[1], eInfo.proj[0]], [endData.pos.lat, endData.pos.lng]);
        routeLine = L.polyline(final, { color: '#ff4757', weight: 8, opacity: 0.8, dashArray: '8, 12' }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding: [80, 80] });
        document.getElementById('routeStatus').style.display = "block";
        document.getElementById('routeStatus').innerHTML = `${startData.name} ➔ ${endData.name}`;
    }

    // --- 互動功能 ---
    window.setPointViaMap = function(name, type) {
        let targetLayer = null;
        geojsonLayer.eachLayer(l => { if (l.feature.properties.name === name) targetLayer = l; });
        if (!targetLayer) return;

        if (!targetLayer.feature.properties.road_id) {
            alert("此區域不可作為起點或終點");
            return;
        }

        const pos = targetLayer.getLatLng ? targetLayer.getLatLng() : targetLayer.getBounds().getCenter();
        applyPoint(name, pos, type);
        map.closePopup();
    }

    function appendKey(k) { if (currentInput.length < 3) currentInput += k; document.getElementById('combinedInput').value = currentInput; }
    
    function clearInput(fullReset = false) { 
        currentInput = ""; document.getElementById('combinedInput').value = ""; 
        if (activeSpot) { 
            // 清除搜尋選中時，判斷是否要回到車位占用樣式
            if (isOccupancyMode && occupiedSet.has(activeSpot.feature.properties.name.toString())) {
                activeSpot.setStyle({ fillOpacity: 0.7, fillColor: "#2d3436", color: "#000" });
            } else {
                geojsonLayer.resetStyle(activeSpot); 
            }
            activeSpot = null; 
        }
        if (fullReset) { 
            if (routeLine) map.removeLayer(routeLine);
            if (startMarker) map.removeLayer(startMarker);
            if (endMarker) map.removeLayer(endMarker);
            startData = null; endData = null; routeLine = null; startMarker = null; endMarker = null;
            document.getElementById('routeStatus').style.display = "none";
        }
    }

    function toggleKeypad() {
        const keypad = document.getElementById('keypadSection');
        if (!keypad.classList.contains('active')) clearInput(true);
        keypad.classList.toggle('active');
    }

    function setPoint(type) {
        if (!currentInput || !geojsonLayer) return;
        const targetName = formatInput(currentInput);
        let target = null;
        geojsonLayer.eachLayer(l => { if (l.feature.properties.name.toString().toUpperCase() === targetName) target = l; });
        
        if (!target) return alert("無此編號: " + targetName);

        if (!target.feature.properties.road_id) {
            alert("此編號不可作為導航點（未配置路徑）");
            return;
        }

        const pos = target.getLatLng ? target.getLatLng() : target.getBounds().getCenter();
        applyPoint(targetName, pos, type);
    }

    function applyPoint(name, pos, type) {
        if (type === 'from') {
            startData = { name, pos };
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.circleMarker(pos, { radius: 10, color: '#0984e3', fillColor: '#0984e3', fillOpacity: 1 }).addTo(map);
        } else {
            endData = { name, pos };
            if (endMarker) map.removeLayer(endMarker);
            endMarker = L.marker(pos, { icon: redFlagIcon }).addTo(map);
        }
        if (startData && endData) { drawRoute(); document.getElementById('keypadSection').classList.remove('active'); }
        else { currentInput = ""; document.getElementById('combinedInput').value = ""; }
    }

    function executeSearch() {
        if (!currentInput || !geojsonLayer) return;
        const targetName = formatInput(currentInput);
        let found = false;
        geojsonLayer.eachLayer(l => {
            if (l.feature.properties.name.toString().toUpperCase() === targetName) {
                if (l.feature.properties.road_id) {
                    const pos = l.getLatLng ? l.getLatLng() : l.getBounds().getCenter();
                    map.setView(pos, 21);
                    l.setStyle({ color: '#ff0000', opacity: 1, weight: 4, fillColor: '#ffff00', fillOpacity: 0.7 });
                    l.openPopup(); activeSpot = l;
                    document.getElementById('keypadSection').classList.remove('active');
                    found = true;
                }
            }
        });
        if (!found && currentInput) alert("找不到具備路徑配置的有效編號: " + targetName);
    }
